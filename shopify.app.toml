# This file stores configurations for your Shopify app

name = "SmartStack"
client_id = "f610b350d4ad6cce60b6033d014ac50b"
# production URL – update if you deploy somewhere else
application_url = "https://smartstack-upsell-app.vercel.app"
embedded = true

[access_scopes]
scopes = "write_products,read_products,write_orders,read_orders,write_customers,read_customers"

[build]
  dir = "build"
  command = "npm run build"
  cwd = "."
  # when running `shopify app dev` the CLI will create a tunnel and
  # automatically replace `application_url` with the temporary HTTPS URL,
  # then register webhooks using that host.  Local `http://localhost` URLs are
  # rejected by Shopify (they must be HTTPS and publicly reachable), which is
  # why you saw the "Invalid value" error with localhost paths.
  automatically_update_urls_on_dev = true

[webhooks]
  api_version = "2024-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"

[auth]
# redirect URI where Shopify will send the OAuth callback – must match your
# app router.  In development this points at localhost; for production it's
# the vercel hostname.  If you deploy elsewhere, update this value accordingly.
redirect_urls = ["https://smartstack-upsell-app.vercel.app/auth/callback"]
